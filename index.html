          <PB v={c.util||0} h={4} cls={pc(c.util||0)}/>
          <div style={{display:'flex',justifyContent:'space-between',marginTop:5,fontSize:'9px',color:'var(--mu)'}}><span>⏱{c.latency||0}ms</span><span>👤{(c.sessions||0).toLocaleString()}</span></div>
        </div>))}
      </div>
      <div className="g2">
        <div className="cd"><div className="cdh">🕸️ Geographic Utilization Radar</div><div style={{position:'relative',height:280,overflow:'hidden'}}><canvas ref={cRef}/></div></div>
        <div className="cd"><div className="cdh">📊 Country Load</div>
          <table><thead><tr><th>Country</th><th>Servers</th><th>VMs</th><th>Util%</th><th>Latency</th><th>Sessions</th><th>Status</th></tr></thead>
            <tbody>{countries.map(c=>(<tr key={c.code}>
              <td><span style={{marginRight:6}}>{c.flag}</span>{c.name}</td>
              <td>{c.servers}</td><td>{c.vms}</td>
              <td style={{color:pcx(c.util||0),fontWeight:700}}>{c.util||0}%</td>
              <td style={{color:c.latency>50?'#f59e0b':'#10b981'}}>{c.latency||0}ms</td>
              <td>{(c.sessions||0).toLocaleString()}</td>
              <td><span className={`bd bd-${(c.util||0)<70?'g':(c.util||0)<85?'y':'r'}`}>{(c.util||0)<70?'NORMAL':(c.util||0)<85?'BUSY':'OVERLOAD'}</span></td>
            </tr>))}</tbody>
          </table>
        </div>
      </div>
    </div>
  );
};

// ─── MAINTENANCE ──────────────────────────────────────────────────────────────
const MaintView=({checked,toggleCheck,sched,toggleSched,onReport})=>{
  const [sf,setSF]=useState('daily');
  const tasks=MAINT[sf]||[];
  const done=tasks.filter(t=>checked[`${sf}_${t.id}`]).length;
  const vcols={daily:'#34d399',weekly:'#60a5fa',monthly:'#fbbf24',quarterly:'#a78bfa',annually:'#fb923c'};
  return(
    <div>
      <div className="g5" style={{marginBottom:13}}>
        {Object.entries(MAINT).filter(([k])=>k!=='responsibilities').map(([k,v])=>{
          const d=v.filter(t=>checked[`${k}_${t.id}`]).length;
          return(<div key={k} className="kp"><div className={`kpa ${k==='daily'?'g':k==='weekly'?'b':k==='monthly'?'y':k==='quarterly'?'p':'o'}`}/><div className="kpl">{k.toUpperCase()}</div><div className="kpv" style={{color:vcols[k]||'#fb923c'}}>{d}/{v.length}</div><PB v={v.length?d/v.length*100:0} h={4} cls={k==='daily'?'g':k==='weekly'?'b':k==='monthly'?'y':'p'}/></div>);
        })}
      </div>
      <div className="cd" style={{marginBottom:12}}>
        <div className="cdh">⏰ Maintenance Schedule Automation</div>
        <div className="g4" style={{gap:10}}>
          {[{k:'daily',l:'Daily',i:'📅',d:'Run every day at set time',timeOpt:true},{k:'weekly',l:'Weekly',i:'📆',d:'Run weekly on selected day',dayOpt:true},{k:'monthly',l:'Monthly',i:'🗓️',d:'1st of every month'},{k:'quarterly',l:'Quarterly',i:'📊',d:'Every 3 months'}].map(so=>{
            const s=sched[so.k]||{};
            return(<div key={so.k} className={`sc${s.on?' on':''}`}>
              <div style={{fontSize:20,marginBottom:6}}>{so.i}</div>
              <div style={{fontFamily:'Plus Jakarta Sans',fontWeight:700,fontSize:12,marginBottom:2}}>{so.l}</div>
              <div style={{fontSize:'9px',color:'var(--mu)',marginBottom:8}}>{so.d}</div>
              {so.timeOpt&&(<div style={{marginBottom:6}}><label>Run Time</label><input type="time" defaultValue={s.time||'08:00'} onChange={e=>toggleSched(so.k,{...s,time:e.target.value})}/></div>)}
              {so.dayOpt&&(<div style={{marginBottom:6}}><label>Day</label><select defaultValue={s.day||'Mon'} onChange={e=>toggleSched(so.k,{...s,day:e.target.value})}>{['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(d=><option key={d}>{d}</option>)}</select></div>)}
              {s.lastRun&&<div style={{fontSize:'9px',color:'var(--mu)',marginBottom:4}}>Last: {fmtTS(s.lastRun)}</div>}
              {s.cnt>0&&<div style={{fontSize:'9px',color:'#34d399',marginBottom:6}}>Reports: {s.cnt}</div>}
              <button className={`btn btn-sm ${s.on?'btn-d':'btn-s'}`} style={{width:'100%',marginTop:4}} onClick={()=>toggleSched(so.k,{...s,on:!s.on})}>{s.on?'⏹ Stop':'▶ Start'}</button>
            </div>);
          })}
        </div>
      </div>
      <div className="cd">
        <div style={{display:'flex',gap:6,marginBottom:12,flexWrap:'wrap'}}>
          {Object.keys(MAINT).filter(k=>k!=='responsibilities').map(k=>(<button key={k} className={`btn btn-xs ${sf===k?'btn-p':'btn-g'}`} onClick={()=>setSF(k)}>{k.charAt(0).toUpperCase()+k.slice(1)} ({MAINT[k].filter(t=>checked[`${k}_${t.id}`]).length}/{MAINT[k].length})</button>))}
          <button className={`btn btn-xs ${sf==='responsibilities'?'btn-p':'btn-g'}`} onClick={()=>setSF('responsibilities')}>📋 Responsibilities</button>
          <TabReportBtn onReport={onReport} label="📊 Report"/>
        <button className="btn btn-g btn-xs" onClick={()=>tasks.forEach(t=>toggleCheck(sf,t.id))}>Check All</button>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:8,fontSize:'10px'}}>
          <span className="cdh" style={{marginBottom:0,color:vcols[sf]||'#fb923c'}}>{sf.toUpperCase()} CHECKLIST</span>
          <span style={{color:'var(--mu)'}}>{done}/{tasks.length} complete</span>
        </div>
        <PB v={tasks.length?done/tasks.length*100:0} h={6} cls={tasks.length&&done===tasks.length?'g':'o'}/>
        <div style={{marginTop:10}}>
          {['Health','Network','Logs','Backup','Security','Services','Storage','Helpdesk','Virtual','AD','Hardware','Docs','Report','OS','Patches','ISP','DR','Inventory','SSL'].map(cat=>{
            const ct=tasks.filter(t=>t.cat===cat);
            if(!ct.length)return null;
            return(<div key={cat} style={{marginBottom:12}}>
              <div style={{fontSize:'9px',color:'var(--mu)',fontWeight:700,letterSpacing:'.08em',textTransform:'uppercase',padding:'5px 0',borderBottom:'1px solid var(--b)',marginBottom:5,display:'flex',justifyContent:'space-between'}}>
                <span>{cat}</span><span>{ct.filter(t=>checked[`${sf}_${t.id}`]).length}/{ct.length}</span>
              </div>
              {ct.map(t=>{
                const d=!!checked[`${sf}_${t.id}`];
                return(<div key={t.id} className={`ci${d?' dn':''}`} onClick={()=>toggleCheck(sf,t.id)}>
                  <div className={`cb${d?' ch':''}`}>{d&&'✓'}</div>
                  <div style={{flex:1,fontSize:'11px',lineHeight:1.4,textDecoration:d?'line-through':'none'}}>{t.task}</div>
                </div>);
              })}
            </div>);
          })}
        </div>

      {/* ── RESPONSIBILITIES VIEW ── */}
      {sf==='responsibilities'&&(
        <div className="cd" style={{marginTop:12}}>
          <div className="cdh" style={{color:'#60a5fa'}}>📋 Typical Responsibilities — NOC / Infrastructure Team</div>
          <div style={{display:'flex',flexDirection:'column',gap:8,marginTop:4}}>
            {(MAINT.responsibilities||[]).map(r=>(
              <div key={r.id} style={{background:'var(--s2)',border:'1px solid var(--b)',borderRadius:8,padding:'11px 14px',display:'flex',gap:14,alignItems:'flex-start'}}>
                <div style={{minWidth:200,flexShrink:0}}>
                  <div style={{fontFamily:'Plus Jakarta Sans',fontWeight:700,fontSize:12,color:'#60a5fa'}}>{r.area}</div>
                </div>
                <div style={{fontSize:'11px',color:'var(--t2)',lineHeight:1.6}}>{r.tasks}</div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
    </div>
  );
};


// ─── WIFI AP VIEW ────────────────────────────────────────────────────────────
const SignalBars=({dbm})=>{
  const lvl=dbm>=-50?4:dbm>=-60?3:dbm>=-70?2:1;
  const cols=['#ef4444','#f59e0b','#f59e0b','#10b981'];
  return(
    <div style={{display:'flex',alignItems:'flex-end',gap:2,height:18}}>
      {[1,2,3,4].map(i=>(
        <div key={i} style={{width:5,height:3+i*3,borderRadius:1,
          background:i<=lvl?cols[lvl-1]:'rgba(255,255,255,.1)'}}/>
      ))}
    </div>
  );
};

const WiFiView=({wifiAPs,onSel,onRealScan,onDemoScan,scanning,scanLog,onReport})=>{
  const cRef=useRef(null),cI=useRef(null);
  const c2Ref=useRef(null),c2I=useRef(null);
  const logRef=useRef(null);
  const totalClients=wifiAPs.reduce((a,ap)=>a+(ap.clientCount||0),0);
  const totalBW=wifiAPs.reduce((a,ap)=>a+(ap.totalBWDown||0)+(ap.totalBWUp||0),0);
  const onlineAPs=wifiAPs.filter(a=>a.status==='online').length;
  const isLive=wifiAPs.some(a=>a.scanNote&&!a.scanNote.includes('demo'));

  // Auto-scroll scan log
  React.useEffect(()=>{
    if(logRef.current)logRef.current.scrollTop=logRef.current.scrollHeight;
  },[scanLog]);

  useEffect(()=>{
    if(cRef.current&&wifiAPs.some(a=>a.hist24?.length)){
      if(cI.current)cI.current.destroy();
      const hrs=Array.from({length:24},(_,i)=>`${i}:00`);
      const colors=['#f97316','#3b82f6','#8b5cf6'];
      cI.current=new Chart(cRef.current,{type:'line',data:{labels:hrs,datasets:wifiAPs.map((ap,i)=>({
        label:ap.name,data:(ap.hist24||[]).map(h=>h.bw||0),
        borderColor:colors[i%3],backgroundColor:colors[i%3]+'15',
        fill:true,tension:.4,borderWidth:1.5,pointRadius:0,
      }))},options:{responsive:true,maintainAspectRatio:false,animation:{duration:500},
        plugins:{legend:{labels:{color:'#94a3b8',font:{size:9}}}},
        scales:{x:{ticks:{color:'#475569',font:{size:8},maxTicksLimit:8},grid:{color:'rgba(30,50,80,.3)'}},
                y:{beginAtZero:true,ticks:{color:'#475569',font:{size:9},callback:v=>v+'M'},grid:{color:'rgba(30,50,80,.3)'}}}}});
    }
    if(c2Ref.current&&wifiAPs.some(a=>a.clients?.length)){
      if(c2I.current)c2I.current.destroy();
      const allC=wifiAPs.flatMap(ap=>(ap.clients||[]).map(c=>({...c,apName:ap.name})));
      const top=allC.sort((a,b)=>((b.bwDown||b.tx_rate||0)+(b.bwUp||b.rx_rate||0))-((a.bwDown||a.tx_rate||0)+(a.bwUp||a.rx_rate||0))).slice(0,10);
      c2I.current=new Chart(c2Ref.current,{type:'bar',data:{
        labels:top.map(c=>c.name||c.hostname||c.mac?.slice(-8)||'Device'),
        datasets:[
          {label:'Download Mbps',data:top.map(c=>parseInt(c.bwDown||c.tx_rate)||0),backgroundColor:'rgba(59,130,246,.6)',borderColor:'rgba(59,130,246,.9)',borderWidth:1,borderRadius:3},
          {label:'Upload Mbps',data:top.map(c=>parseInt(c.bwUp||c.rx_rate)||0),backgroundColor:'rgba(249,115,22,.5)',borderColor:'rgba(249,115,22,.8)',borderWidth:1,borderRadius:3},
        ]},options:{responsive:true,maintainAspectRatio:false,animation:{duration:500},
          plugins:{legend:{labels:{color:'#94a3b8',font:{size:9}}}},
          scales:{x:{ticks:{color:'#475569',font:{size:9}},grid:{color:'rgba(30,50,80,.3)'}},
                  y:{beginAtZero:true,ticks:{color:'#475569',font:{size:9},callback:v=>v+'M'},grid:{color:'rgba(30,50,80,.3)'}}}}});
    }
  },[wifiAPs]);

  return(
    <div>
      {/* ── Scan Control Panel ── */}
      <div className="cd" style={{marginBottom:13,border:'1px solid rgba(249,115,22,.3)',background:'rgba(249,115,22,.03)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:12}}>
          <div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
              <div style={{fontFamily:'Plus Jakarta Sans',fontWeight:800,fontSize:15}}>📶 WiFi Access Point Scanner</div>
              <TabReportBtn onReport={onReport} label="📊 WiFi Report"/>
            </div>
            <div style={{fontSize:'10px',color:'var(--mu)',marginBottom:8}}>Connects directly to AP admin panels on your LAN using stored credentials</div>
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              {[
                {id:'ap1',name:'OL-WI-FI-1',      ip:'192.168.110.1', vendor:'TP-Link'},
                {id:'ap2',name:'Ovrlod-Wifi-2',    ip:'10.0.0.1',      vendor:'TP-Link'},
                {id:'ap3',name:'HWAWEI-5PkT',       ip:'192.168.100.1', vendor:'Huawei'},
              ].map(ap=>{
                const live=wifiAPs.find(a=>a.id===ap.id);
                const st=live?.status||'unknown';
                return(
                  <div key={ap.id} style={{background:'var(--s2)',border:`1px solid ${st==='online'?'rgba(16,185,129,.3)':st==='offline'?'rgba(239,68,68,.3)':'var(--b)'}`,borderRadius:7,padding:'7px 11px',fontSize:'10px'}}>
                    <div style={{fontWeight:700,color:'#fb923c'}}>{ap.name}</div>
                    <div style={{color:'var(--mu)',fontFamily:'JetBrains Mono',fontSize:'9px'}}>{ap.ip}</div>
                    <div style={{marginTop:3}}>
                      <span className={`bd bd-${st==='online'?'g':st==='offline'?'r':st==='degraded'?'y':'gr'}`} style={{fontSize:'8px'}}>
                        ●{st==='online'?`ONLINE (${live?.clientCount||0} clients)`:st==='offline'?'OFFLINE':st==='degraded'?'DEGRADED':'NOT SCANNED'}
                      </span>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:8,alignItems:'flex-end'}}>
            <button className="btn btn-p" onClick={onRealScan} disabled={scanning}
              style={{minWidth:160}}>
              {scanning?<><span className="spin"/> Scanning APs...</>:'🔍 Real Scan (Live Data)'}
            </button>
            <button className="btn btn-g btn-sm" onClick={onDemoScan} disabled={scanning}>🎭 Load Demo Data</button>
            {isLive&&<span className="bd bd-g" style={{fontSize:'9px'}}>✅ Showing Live Data</span>}
          </div>
        </div>

        {/* Scan log — compact */}
        {scanning&&(
          <div style={{marginTop:10,padding:'8px 12px',background:'rgba(59,130,246,.06)',border:'1px solid rgba(59,130,246,.2)',borderRadius:6,display:'flex',alignItems:'center',gap:10}}>
            <span className="spin" style={{display:'inline-block'}}/>
            <span style={{fontSize:'10px',color:'#60a5fa'}}>{scanLog.slice(-1)[0]||'Connecting to APs...'}</span>
          </div>
        )}
        {!scanning&&scanLog.length>0&&(
          <details style={{marginTop:10}}>
            <summary style={{fontSize:'9px',color:'var(--mu)',cursor:'pointer',userSelect:'none'}}>📋 Scan log ({scanLog.length} entries)</summary>
            <div style={{background:'var(--bg)',border:'1px solid var(--b)',borderRadius:6,padding:'8px 10px',maxHeight:100,overflowY:'auto',fontFamily:'JetBrains Mono',fontSize:'9px',color:'var(--t3)',lineHeight:1.7,marginTop:4}}>
              {scanLog.map((line,i)=>(
                <div key={i} style={{color:line.includes('✅')?'#34d399':line.includes('❌')?'#f87171':line.includes('⚠️')?'#fbbf24':'var(--t3)'}}>{line}</div>
              ))}
            </div>
          </details>
        )}

        {/* Important note about browser limitations */}
        <div style={{marginTop:10,padding:'9px 12px',background:'rgba(59,130,246,.05)',border:'1px solid rgba(59,130,246,.2)',borderRadius:6,fontSize:'10px',color:'var(--t3)'}}>
          <div style={{fontWeight:700,color:'#60a5fa',marginBottom:5}}>ℹ️ How WiFi Real Scan Works</div>
          <div style={{marginBottom:4}}>The browser attempts direct HTTP login to each AP admin panel on your LAN. This works when:</div>
          <div style={{paddingLeft:10,marginBottom:6}}>
            <div>✅ Your PC and the APs are on the <b>same network</b> (192.168.x.x / 10.0.x.x)</div>
            <div>✅ The router allows HTTP (not HTTPS-only)</div>
            <div>✅ The router does not block cross-origin requests</div>
          </div>
          <div style={{color:'#fbbf24',marginBottom:4}}>⚠️ If scan shows <b>"CORS Blocked"</b> — use the <b>wifi_scraper.py</b> Python script instead:</div>

            pip install requests openpyxl reportlab &nbsp;&nbsp;→&nbsp;&nbsp; python wifi_scraper.py
          </div>
        </div>
      </div>

      {/* KPIs */}
      <div className="g4" style={{marginBottom:13}}>
        {[
          {l:'Access Points',v:wifiAPs.length,ac:'o',vc:'#fb923c',ic:'📶'},
          {l:'Online APs',v:onlineAPs,ac:'g',vc:'#34d399',ic:'✅'},
          {l:'Total Clients',v:totalClients,ac:'b',vc:'#60a5fa',ic:'👤'},
          {l:'Total WiFi BW',v:`${totalBW}M`,ac:'p',vc:'#a78bfa',ic:'📊'},
        ].map((k,i)=>(
          <div key={i} className="kp">
            <div className={`kpa ${k.ac}`}/>
            <div className="kpi2">{k.ic}</div>
            <div className="kpl">{k.l}</div>
            <div className="kpv" style={{color:k.vc}}>{k.v}</div>
          </div>
        ))}

        {wifiAPs.map((ap,apIdx)=>(
          <div key={ap.id} style={{background:'var(--s2)',border:`1px solid ${ap.status==='online'?'rgba(16,185,129,.3)':ap.status==='offline'?'rgba(239,68,68,.25)':ap.status==='degraded'?'rgba(245,158,11,.25)':'var(--b)'}`,borderLeft:`3px solid ${ap.status==='online'?'#10b981':ap.status==='offline'?'#ef4444':ap.status==='degraded'?'#f59e0b':'var(--b3)'}`,borderRadius:10,padding:'14px 16px'}}>

// ─── PATCHES ─────────────────────────────────────────────────────────────────
const PatchView=({servers,vHosts=[],onReport})=>{
  const allVMs=vHosts.flatMap(h=>(h.vms||[]).map(v=>({...v,_hostName:h.name,_isVM:true})));
  const allNodes=[
    ...servers.map(s=>({...s,_category:'Physical Server'})),
    ...vHosts.map(h=>({...h,_category:'Hypervisor Host'})),
    ...allVMs.map(v=>({...v,_category:`VM @ ${v._hostName}`})),
  ];
  const p = allNodes.filter(s=>s.patches?.installed||s.patches?.pending||s.patches?.critical||s.patches?.failed);
  const tc = p.reduce((s,x)=>s+(x.patches?.critical||0),0);
  const tp = p.reduce((s,x)=>s+(x.patches?.pending||0),0);
  const tf = p.reduce((s,x)=>s+(x.patches?.failed||0),0);
  const ti = p.reduce((s,x)=>s+(x.patches?.installed||0),0);
  const [filter,setFilter]=useState('all');
  const [search,setSearch]=useState('');

  const filtered=p.filter(s=>{
    if(filter==='critical' && !(s.patches?.critical>0)) return false;
    if(filter==='pending'  && !(s.patches?.pending>0))  return false;
    if(filter==='failed'   && !(s.patches?.failed>0))   return false;
    if(search && !s.name.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  const catColor={
    'Physical Server':'#fb923c',
    'Hypervisor Host':'#a78bfa',
  };

  return(
  <div>
    <div className="g4" style={{marginBottom:13}}>
      {[
        {l:'Total Installed', v:ti, ac:'g',vc:'#34d399'},
        {l:'Pending Updates',  v:tp, ac:'y',vc:'#fbbf24'},
        {l:'Critical Pending', v:tc, ac:'r',vc:'#f87171'},
        {l:'Failed',           v:tf, ac:'r',vc:'#f87171'},
      ].map((k,i)=>(<div key={i} className="kp"><div className={`kpa ${k.ac}`}/><div className="kpl">{k.l}</div><div className="kpv" style={{color:k.vc}}>{k.v}</div></div>))}
    </div>

    {tc>0&&(
      <div style={{background:'rgba(239,68,68,.06)',border:'1px solid rgba(239,68,68,.25)',borderRadius:8,padding:'11px 14px',marginBottom:13,display:'flex',gap:9,alignItems:'center'}}>
        <span style={{fontSize:18}}>🚨</span>
        <div>
          <div style={{fontWeight:700,color:'#f87171',fontSize:12}}>Critical Security Patches Required</div>
          <div style={{fontSize:'10px',color:'var(--mu)',marginTop:2}}>
            {p.filter(s=>s.patches?.critical>0).map(s=>s.name).join(', ')} — apply immediately
          </div>
        </div>
      </div>
    )}

    {/* Filter + search */}
    <div style={{display:'flex',gap:7,marginBottom:12,flexWrap:'wrap',alignItems:'center'}}>
      {[['all','All'],['critical','Critical'],['pending','Pending'],['failed','Failed']].map(([v,l])=>(
        <button key={v} className={`btn btn-xs ${filter===v?'btn-p':'btn-g'}`} onClick={()=>setFilter(v)}>{l}</button>
      ))}
      <TabReportBtn onReport={onReport} label="📊 Patch Report"/>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search server..."
        style={{marginLeft:'auto',background:'var(--s2)',border:'1px solid var(--b)',borderRadius:5,padding:'4px 9px',color:'var(--tx)',fontSize:'11px',width:180}}/>
      <span style={{fontSize:'9px',color:'var(--mu)'}}>{filtered.length} of {p.length} nodes</span>
    </div>

    <div className="cd">
      <div className="cdh">🔄 Patch Status — All Servers & VMs ({p.length} nodes)</div>
      <div className="twrap">
        <table>
          <thead className="sticky-th">
            <tr>
              <th>Server / VM</th><th>Category</th><th>OS</th>
              <th>Installed</th><th>Pending</th><th>Critical</th><th>Failed</th>
              <th>Last Update</th><th>Status</th>
            </tr>
          </thead>
          <tbody>
            {filtered.map(s=>(
              <tr key={s.id} style={{background:s.patches?.critical>0?'rgba(239,68,68,.03)':s.patches?.pending>0?'rgba(245,158,11,.02)':'transparent'}}>
                <td>
                  <div style={{fontWeight:700,color:catColor[s._category]||'#a78bfa',fontSize:11}}>{s.name}</div>
                  {s._hostName&&<div style={{fontSize:'8px',color:'var(--mu)'}}>Host: {s._hostName}</div>}
                </td>
                <td>
                  <span className={`bd bd-${s._category==='Physical Server'?'o':s._category==='Hypervisor Host'?'p':'gr'}`} style={{fontSize:'8px'}}>
                    {s._category}
                  </span>
                </td>
                <td style={{fontSize:'9px',color:'var(--mu)'}}>{s.os}</td>
                <td style={{color:'#34d399',fontWeight:700}}>{s.patches?.installed||0}</td>
                <td style={{color:s.patches?.pending>0?'#fbbf24':'var(--mu)',fontWeight:s.patches?.pending>0?700:400}}>
                  {s.patches?.pending||0}
                </td>
                <td style={{color:s.patches?.critical>0?'#f87171':'var(--mu)',fontWeight:s.patches?.critical>0?700:400}}>
                  {s.patches?.critical||0}
                </td>
                <td style={{color:s.patches?.failed>0?'#f87171':'var(--mu)'}}>{s.patches?.failed||0}</td>
                <td style={{fontSize:'9px',color:'var(--mu)'}}>{s.patches?.lastUpdate?.toLocaleDateString()||'—'}</td>
                <td>
                  <span className={`bd bd-${s.patches?.critical>0?'r':s.patches?.pending>0?'y':'g'}`} style={{fontSize:'8px'}}>
                    {s.patches?.critical>0?'🚨 CRITICAL':s.patches?.pending>0?'⚠️ PENDING':'✅ CURRENT'}
                  </span>
                </td>
              </tr>
            ))}
            {filtered.length===0&&(
              <tr><td colSpan={9} style={{textAlign:'center',color:'var(--mu)',fontSize:'11px',padding:'16px 0'}}>
                No patch data yet — Run Health Check to populate all servers and VMs
              </td></tr>
            )}
          </tbody>
        </table>
      </div>
    </div>
  </div>
  );
};

// ─── SSL CERTIFICATE MONITOR ─────────────────────────────────────────────────
const SSLView=({certs,onReport})=>{
  const critical=certs.filter(c=>c.daysLeft<=14);
  const warning=certs.filter(c=>c.daysLeft>14&&c.daysLeft<=30);
  const ok=certs.filter(c=>c.daysLeft>30);
  const nearest=certs.length?[...certs].sort((a,b)=>a.daysLeft-b.daysLeft)[0]:null;
  const cc=d=>d<=7?'#ef4444':d<=14?'#f87171':d<=30?'#f59e0b':d<=90?'#fbbf24':'#10b981';
  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
      <span style={{fontSize:'11px',color:'var(--mu)',fontWeight:600}}>{certs.filter(c=>c.daysLeft<=30).length} expiring within 30 days</span>
      <TabReportBtn onReport={onReport} label="📊 SSL Report"/>
    </div>
    <div className="g4" style={{marginBottom:13}}>
        {[
          {l:'Total Certs',v:certs.length,ac:'b',vc:'#60a5fa',ic:'🔐'},
          {l:'Critical ≤14 days',v:critical.length,ac:'r',vc:'#f87171',ic:'🚨'},
          {l:'Warning 15–30 days',v:warning.length,ac:'y',vc:'#fbbf24',ic:'⚠️'},
          {l:'Healthy >30 days',v:ok.length,ac:'g',vc:'#34d399',ic:'✅'},
        ].map((k,i)=>(<div key={i} className="kp"><div className={`kpa ${k.ac}`}/><div className="kpi2">{k.ic}</div><div className="kpl">{k.l}</div><div className="kpv" style={{color:k.vc}}>{k.v}</div></div>))}
      </div>
      {critical.length>0&&(
        <div style={{background:'rgba(239,68,68,.07)',border:'1px solid rgba(239,68,68,.25)',borderRadius:9,padding:'13px 16px',marginBottom:13,display:'flex',gap:12,alignItems:'flex-start'}}>
          <span style={{fontSize:22}}>🚨</span>
          <div>
            <div style={{fontFamily:'Plus Jakarta Sans',fontWeight:700,fontSize:13,color:'#f87171',marginBottom:6}}>{critical.length} Certificate{critical.length!==1?'s':''} Expiring Within 14 Days — Immediate Action Required</div>
            {critical.map(c=>(<div key={c.id} style={{fontSize:'10px',color:'var(--t2)',marginBottom:3}}>• <b style={{color:'#f87171'}}>{c.domain}</b> expires in <b style={{color:'#ef4444'}}>{c.daysLeft} day{c.daysLeft!==1?'s':''}</b> — {c.issuer} ({c.ip})</div>))}
          </div>
        </div>
      )}
      {nearest&&(
        <div className="cd" style={{marginBottom:13}}>
          <div className="cdh">⏱️ Next Certificate Expiry</div>
          <div style={{display:'flex',alignItems:'center',gap:20}}>
            <div style={{textAlign:'center',minWidth:100}}>
              <div style={{fontFamily:'Plus Jakarta Sans',fontWeight:800,fontSize:40,color:cc(nearest.daysLeft),lineHeight:1}}>{nearest.daysLeft}</div>
              <div style={{fontSize:'10px',color:'var(--mu)',marginTop:4}}>DAYS REMAINING</div>
            </div>
            <div style={{flex:1}}>
              <div style={{fontFamily:'Plus Jakarta Sans',fontWeight:700,fontSize:15,marginBottom:4}}>{nearest.domain}</div>
              <div style={{fontSize:'10px',color:'var(--mu)',marginBottom:6}}>{nearest.ip} · Issuer: {nearest.issuer}</div>
              <div style={{fontSize:'10px',color:'var(--mu)',marginBottom:6}}>Expires: <b style={{color:cc(nearest.daysLeft)}}>{nearest.expiry?.toLocaleDateString('en-US',{dateStyle:'long'})}</b></div>
              <div className="pb" style={{height:8}}><div className={`pbf ${nearest.daysLeft<=14?'r':nearest.daysLeft<=30?'y':'g'}`} style={{width:`${Math.min(100,Math.round(nearest.daysLeft/365*100))}%`}}/></div>
            </div>
          </div>
        </div>
      )}
      <div className="cd">
        <div className="cdh">🔐 SSL/TLS Certificate Inventory</div>
        <div className="twrap">
          <table>
            <thead className="sticky-th"><tr><th>Domain</th><th>Server IP</th><th>Issuer</th><th>Expires</th><th>Days Left</th><th>Status</th><th>Action Required</th></tr></thead>
            <tbody>
              {[...certs].sort((a,b)=>a.daysLeft-b.daysLeft).map(c=>(
                <tr key={c.id} style={{background:c.daysLeft<=14?'rgba(239,68,68,.04)':c.daysLeft<=30?'rgba(245,158,11,.03)':'transparent'}}>
                  <td style={{fontWeight:700}}>{c.domain}</td>
                  <td style={{fontFamily:'JetBrains Mono',fontSize:'9px',color:'var(--mu)'}}>{c.ip}</td>
                  <td style={{fontSize:'10px',color:'var(--mu)'}}>{c.issuer}</td>
                  <td style={{fontSize:'10px'}}>{c.expiry?.toLocaleDateString('en-US',{dateStyle:'medium'})}</td>
                  <td>
                    <div style={{display:'flex',alignItems:'center',gap:7}}>
                      <span style={{fontFamily:'Plus Jakarta Sans',fontWeight:800,fontSize:16,color:cc(c.daysLeft)}}>{c.daysLeft}</span>
                      <div className="pb" style={{width:55,height:5}}><div className={`pbf ${c.daysLeft<=14?'r':c.daysLeft<=30?'y':'g'}`} style={{width:`${Math.min(100,Math.round(c.daysLeft/365*100))}%`}}/></div>
                    </div>
                  </td>
                  <td><span className={`bd bd-${c.daysLeft<=14?'r':c.daysLeft<=30?'y':'g'}`}>{c.daysLeft<=7?'🚨 CRITICAL':c.daysLeft<=14?'⚠️ URGENT':c.daysLeft<=30?'⚠️ RENEW SOON':'✅ OK'}</span></td>
                  <td style={{fontSize:'9px',color:c.daysLeft<=30?'#fbbf24':'var(--mu)'}}>
                    {c.daysLeft<=7?'Renew IMMEDIATELY':c.daysLeft<=14?'Schedule this week':c.daysLeft<=30?'Renew within '+Math.max(0,c.daysLeft-7)+' days':'No action needed'}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div style={{marginTop:12,padding:'9px 12px',background:'rgba(59,130,246,.04)',border:'1px solid rgba(59,130,246,.14)',borderRadius:7}}>
          <div style={{fontSize:'10px',fontWeight:700,color:'#60a5fa',marginBottom:5}}>📋 Renewal Commands</div>
          <div className="g3" style={{gap:7,fontSize:'9px',color:'var(--mu)'}}>
            <span><b style={{color:'var(--t2)'}}>Let's Encrypt:</b> certbot renew --force-renewal</span>
            <span><b style={{color:'var(--t2)'}}>DigiCert/Sectigo:</b> Login portal → Reissue</span>
            <span><b style={{color:'var(--t2)'}}>Self-signed:</b> openssl req -new -x509 -days 365 -keyout key.pem -out cert.pem</span>
          </div>
        </div>
      </div>
    </div>
  );
};

// ─── REPORTS VIEW ────────────────────────────────────────────────────────────
const RptView=({reports,servers,vHosts,switches,firewalls,wanLinks,wifiAPs,sched,toggleSched,onGen,onExport,onPDF})=>{
  const [activeTab,setActiveTab]=useState('summary');
  const cRef=useRef(null),cI=useRef(null);

  useEffect(()=>{
    if(!cRef.current||reports.length<2||activeTab!=='history')return;
    if(cI.current)cI.current.destroy();
    const last=reports.slice(0,12).reverse();
    cI.current=new Chart(cRef.current,{type:'line',
      data:{labels:last.map(r=>r.generated.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false})),
        datasets:[
          {label:'Healthy',data:last.map(r=>r.healthy),borderColor:'#10b981',backgroundColor:'rgba(16,185,129,.06)',fill:true,tension:.4,borderWidth:1.5,pointRadius:2},
          {label:'Warning',data:last.map(r=>r.warnings||0),borderColor:'#f59e0b',backgroundColor:'rgba(245,158,11,.06)',fill:true,tension:.4,borderWidth:1.5,pointRadius:2},
          {label:'Critical',data:last.map(r=>r.critical||0),borderColor:'#ef4444',backgroundColor:'rgba(239,68,68,.06)',fill:true,tension:.4,borderWidth:1.5,pointRadius:2},
        ]},
      options:{responsive:true,maintainAspectRatio:false,animation:{duration:500},
        plugins:{legend:{labels:{color:'#94a3b8',font:{size:9}}}},
        scales:{x:{ticks:{color:'#475569',font:{size:8},maxTicksLimit:8},grid:{color:'rgba(30,50,80,.3)'}},
                y:{beginAtZero:true,ticks:{color:'#475569',font:{size:9}},grid:{color:'rgba(30,50,80,.3)'}}}}});
  },[reports,activeTab]);

  // Report tabs config
  const RPT_TABS=[
    {id:'summary',   label:'📋 Summary',    badge:0},
    {id:'servers',   label:'🖥️ Servers',    badge:servers.filter(s=>s.status==='critical').length},
    {id:'vms',       label:'🔲 Virtual Infra',badge:vHosts.flatMap(h=>h.vms||[]).filter(v=>v.status==='offline').length},
    {id:'events',    label:'🚨 Events',     badge:servers.flatMap(s=>s.events||[]).filter(e=>e.type==='er').length},
    {id:'firewall',  label:'🔥 Firewall',   badge:0},
    {id:'network',   label:'🔌 Network',    badge:0},
    {id:'wifi',      label:'📶 WiFi',       badge:(wifiAPs||[]).filter(a=>a.status==='degraded'||a.status==='offline').length},
    {id:'schedules', label:'⏰ Schedules',  badge:0},
    {id:'history',   label:'📈 History',    badge:reports.length},
    {id:'enhance',   label:'💡 Roadmap',    badge:0},
  ];

  const sc=servers.filter(s=>s.status!=='unknown');
  const use=sc.length>0?sc:servers;
  const allEvents=servers.flatMap(s=>(s.events||[]).map(e=>({...e,src:s.name})));
  const critEvents=allEvents.filter(e=>e.type==='er');

  return(
    <div>
      {/* Action Bar */}
      <div className="cd" style={{marginBottom:13}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10}}>
          <div>
            <div style={{fontFamily:'Plus Jakarta Sans',fontWeight:800,fontSize:16}}>📈 Report Center</div>
            <div style={{fontSize:'10px',color:'var(--mu)',marginTop:2}}>Infrastructure Intelligence — {new Date().toLocaleDateString('en-US',{dateStyle:'long'})}</div>
          </div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            <button className="btn btn-p" onClick={onGen}>📊 Generate Report</button>
            <button className="btn btn-s" onClick={onExport} title="Downloads a real .xlsx file with 9 tabs to your Downloads folder">
              ⬇️ Export XLSX (9 tabs)
            </button>
            <button className="btn" style={{background:'rgba(239,68,68,.1)',color:'#f87171',borderColor:'rgba(239,68,68,.25)'}} onClick={onPDF}>📄 Export PDF</button>
          </div>
        </div>
      </div>

      {/* Report Tab Bar */}
      <div className="cd" style={{padding:'0',paddingTop:0,marginBottom:0}}>
        <div className="rpt-tab-bar" style={{padding:'0 16px'}}>
          {RPT_TABS.map(t=>(
            <button key={t.id} className={`rpt-tab${activeTab===t.id?' on':''}`} onClick={()=>setActiveTab(t.id)}>
              {t.label}
              {t.badge>0&&<span className="rpt-tab-badge">{t.badge}</span>}
            </button>
          ))}
        </div>
      </div>

      {/* ── SUMMARY TAB ── */}
      {activeTab==='summary'&&(
        <div>
          <div className="rpt-page">
            <div className="rpt-page-title">📋 Executive Summary</div>
            <div className="rpt-kpi-row">
              {[
                {l:'Total Servers',v:servers.length,c:'#fb923c'},{l:'Healthy',v:use.filter(s=>s.status==='healthy').length,c:'#34d399'},
                {l:'Warning',v:use.filter(s=>s.status==='warning').length,c:'#fbbf24'},{l:'Critical',v:use.filter(s=>s.status==='critical').length,c:'#f87171'},
                {l:'Total VMs',v:vHosts.reduce((a,h)=>a+h.vms.length,0),c:'#a78bfa'},{l:'Threats 24h',v:firewalls.reduce((s,f)=>s+(f.threats||0),0).toLocaleString(),c:'#f87171'},
                {l:'WiFi Clients',v:(wifiAPs||[]).reduce((a,ap)=>a+(ap.clientCount||0),0),c:'#22d3ee'},{l:'Critical Events',v:critEvents.length,c:'#f87171'},
              ].map((k,i)=>(
                <div key={i} className="rpt-kpi"><div className="rpt-kpi-l">{k.l}</div><div className="rpt-kpi-v" style={{color:k.c,fontSize:22}}>{k.v}</div></div>
              ))}
            </div>
            {critEvents.length>0&&(
              <div style={{background:'rgba(239,68,68,.06)',border:'1px solid rgba(239,68,68,.2)',borderRadius:8,padding:'11px 14px',marginTop:8}}>
                <div style={{fontWeight:700,color:'#f87171',marginBottom:6,fontSize:12}}>🚨 ACTION REQUIRED — {critEvents.length} Critical Events</div>
                {critEvents.slice(0,5).map((e,i)=>(
                  <div key={i} style={{fontSize:'10px',color:'var(--t2)',marginBottom:3}}>• <b style={{color:'#fb923c'}}>{e.src}:</b> {e.event}</div>
                ))}
                {critEvents.length>5&&<div style={{fontSize:'9px',color:'var(--mu)',marginTop:4}}>+{critEvents.length-5} more critical events — see Events tab</div>}
              </div>
            )}
          </div>
          <div className="g3">
            {[
              {label:'Avg CPU',value:use.length?Math.round(use.reduce((s,x)=>s+x.cpu,0)/use.length):0,unit:'%',c:'#fb923c'},
              {label:'Avg Memory',value:use.length?Math.round(use.reduce((s,x)=>s+x.memory,0)/use.length):0,unit:'%',c:'#3b82f6'},
              {label:'Avg Disk',value:use.length?Math.round(use.reduce((s,x)=>s+x.disk,0)/use.length):0,unit:'%',c:'#8b5cf6'},
            ].map(m=>(
              <div key={m.label} className="rpt-page">
                <div style={{fontSize:'10px',color:'var(--mu)',marginBottom:6}}>{m.label}</div>
                <div style={{fontFamily:'Plus Jakarta Sans',fontWeight:800,fontSize:32,color:m.c}}>{m.value}{m.unit}</div>
                <PB v={m.value} h={8} cls={pc(m.value)}/>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ── VIRTUAL INFRA TAB ── */}
      {activeTab==='vms'&&(
        <div>
          <div className="rpt-page" style={{marginBottom:12}}>
            <div className="rpt-page-title" style={{color:'#a78bfa'}}>🔲 Virtual Infrastructure Report</div>
            <div className="rpt-kpi-row">
              <div className="rpt-kpi"><div className="rpt-kpi-l">Hypervisor Hosts</div><div className="rpt-kpi-v" style={{color:'#fb923c'}}>{vHosts.length}</div></div>
              <div className="rpt-kpi"><div className="rpt-kpi-l">Total VMs</div><div className="rpt-kpi-v" style={{color:'#a78bfa'}}>{vHosts.reduce((a,h)=>a+(h.vms||[]).length,0)}</div></div>
              <div className="rpt-kpi"><div className="rpt-kpi-l">Online</div><div className="rpt-kpi-v" style={{color:'#34d399'}}>{vHosts.flatMap(h=>h.vms||[]).filter(v=>v.status==='running').length}</div></div>
              <div className="rpt-kpi"><div className="rpt-kpi-l">Offline</div><div className="rpt-kpi-v" style={{color:'#f87171'}}>{vHosts.flatMap(h=>h.vms||[]).filter(v=>v.status==='offline').length}</div></div>
            </div>
          </div>
          {vHosts.map(h=>(
            <div key={h.id} className="rpt-page" style={{marginBottom:10}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:10}}>
                <div>
                  <div style={{fontFamily:'Plus Jakarta Sans',fontWeight:700,fontSize:14}}>{h.name}</div>
                  <div style={{fontSize:'10px',color:'var(--mu)'}}>{h.ip} · {h.os} · {(h.vms||[]).length} VMs</div>
                  {h.credentials&&<div style={{fontSize:'9px',color:'var(--mu)',marginTop:2}}>🔐 Access: {h.credentials.user}</div>}
                </div>
                <span className={`bd bd-${h.status==='healthy'?'g':h.status==='warning'?'y':'gr'}`}>{h.status?.toUpperCase()||'?'}</span>
              </div>
              <div className="twrap">
                <table>
                  <thead><tr><th>Ping</th><th>VM Name</th><th>OS</th><th>Role</th><th>IP</th><th>Access ID</th><th>Status</th><th>CPU%</th><th>Mem%</th><th>Uptime</th></tr></thead>
                  <tbody>
                    {(h.vms||[]).map(vm=>(
                      <tr key={vm.id} style={{background:vm.status==='offline'?'rgba(239,68,68,.04)':'transparent'}}>

                        <td style={{fontFamily:'JetBrains Mono',fontSize:'9px',color:'var(--mu)'}}>{vm.creds?.user||'—'}</td>
                        <td><span className={`bd bd-${vm.status==='running'?'g':vm.status==='offline'?'r':'y'}`} style={{fontSize:'8px'}}>{vm.status==='running'?'ONLINE':vm.status==='offline'?'OFFLINE':'WARN'}</span></td>

            <table>
              <thead className="sticky-th"><tr><th>Server</th><th>IP</th><th>OS</th><th>Status</th><th>CPU%</th><th>Mem%</th><th>Disk%</th><th>°C</th><th>Uptime</th><th>Events</th><th>Patches</th></tr></thead>
              <tbody>{servers.map(s=>(
                <tr key={s.id}>
                  <td><b style={{color:'#fb923c'}}>{s.name}</b><div style={{fontSize:'9px',color:'var(--mu)'}}>{s.role}</div></td>
                  <td style={{fontFamily:'JetBrains Mono',fontSize:'9px',color:'var(--mu)'}}>{s.ip}</td>
                  <td style={{fontSize:'9px',color:'var(--mu)'}}>{s.os}</td>
                  <td><span className={`bd bd-${s.status==='healthy'?'g':s.status==='warning'?'y':s.status==='critical'?'r':'gr'}`}>{s.status?.toUpperCase()||'?'}</span></td>

      {/* ── EVENTS TAB ── */}
      {activeTab==='events'&&(
        <div>
          <div className="rpt-page" style={{marginBottom:12}}>
            <div className="rpt-page-title">🚨 Event Report — All Servers</div>

              <div className="rpt-kpi"><div className="rpt-kpi-l">Servers w/ Issues</div><div className="rpt-kpi-v" style={{color:'#f87171'}}>{servers.filter(s=>(s.events||[]).some(e=>e.type==='er')).length}</div></div>

          </div>
          {servers.filter(s=>(s.events||[]).length>0).map(s=>(
            <div key={s.id} className="rpt-page" style={{marginBottom:10}}>

              </div>
              {(s.events||[]).map((ev,i)=>{
                const sol=ev.sol||getSolution(ev.event||'');
                return(
                  <div key={i} className={`ev ${ev.type||'in'}`} style={{marginBottom:8,cursor:'default'}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                      <span className={`bd bd-${ev.type==='er'?'r':ev.type==='wa'?'y':'b'}`}>{ev.type==='er'?'🚨 CRITICAL':ev.type==='wa'?'⚠️ WARNING':'ℹ️ INFO'}</span>
                      <span style={{fontSize:'9px',color:'var(--mu)'}}>{fmtTS(ev.ts)}</span>
                    </div>
                    {(()=>{const m=(ev.event||'').match(/Event ID (\d+)/i);const eid=m?m[1]:null;const desc=eid?(ev.event||'').replace(/Event ID \d+ · /i,'').trim():(ev.event||'');return(<>
                      {eid&&<div style={{marginBottom:4}}><span style={{background:'rgba(99,102,241,.12)',border:'1px solid rgba(99,102,241,.25)',color:'#818cf8',padding:'2px 8px',borderRadius:4,fontSize:'9px',fontFamily:'JetBrains Mono',fontWeight:700}}>Event ID {eid}</span></div>}
                      <div style={{fontSize:'11px',fontWeight:600,marginBottom:6,color:'var(--tx)'}}>{desc}</div>
                    </>);})()}
                    <div style={{background:'rgba(16,185,129,.05)',border:'1px solid rgba(16,185,129,.2)',borderRadius:6,padding:'8px 10px'}}>
                      <div style={{fontSize:'10px',fontWeight:700,color:'#34d399',marginBottom:5}}>💡 Solution — {sol.sev?.toUpperCase()||'INFO'} Severity:</div>
                      {(sol.steps||[]).length>0?(sol.steps||[]).map((step,si)=>(
                        <div key={si} style={{display:'flex',gap:7,marginBottom:3,fontSize:'10px',color:'var(--t2)'}}>
                          <span style={{color:'#34d399',fontWeight:700,minWidth:16}}>{si+1}.</span><span>{step}</span>
                        </div>
                      )):<div style={{fontSize:'10px',color:'var(--mu)',fontStyle:'italic'}}>No steps — check Windows Event Viewer</div>}
                    </div>
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      )}

      {/* ── FIREWALL TAB ── */}
      {activeTab==='firewall'&&(
        <div>
          {firewalls.map(fw=>(
            <div key={fw.id} className="rpt-page" style={{marginBottom:12}}>
              <div className="rpt-page-title" style={{color:'#f87171'}}>🔥 {fw.name} — {fw.model}</div>
              <div className="rpt-kpi-row" style={{marginBottom:12}}>
                {[{l:'Connections',v:(fw.connections||0).toLocaleString(),c:'#60a5fa'},{l:'Threats 24h',v:(fw.threats||0).toLocaleString(),c:'#f87171'},{l:'Sessions',v:(fw.sessions||0).toLocaleString(),c:'#a78bfa'},{l:'VPN Users',v:fw.vpnUsers||0,c:'#34d399'},{l:'CPU',v:`${fw.cpu||0}%`},{l:'Memory',v:`${fw.mem||0}%`}].map(s=>(
                  <div key={s.l} className="rpt-kpi"><div className="rpt-kpi-l">{s.l}</div><div className="rpt-kpi-v" style={{fontSize:16,color:s.c||'var(--tx)'}}>{s.v}</div></div>
                ))}
              </div>
              <div className="rpt-section">
                <div style={{fontSize:'10px',fontWeight:700,color:'var(--mu)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:8}}>Active Rules ({(fw.rules||[]).length})</div>
                <div className="twrap">
                  <table>
                    <thead><tr><th>#</th><th>Proto</th><th>Src→Dst Zone</th><th>Service</th><th>Action</th><th>Sessions</th><th>BW Mbps</th><th>Hits</th><th>Last Hit</th></tr></thead>
                    <tbody>{(fw.rules||[]).slice(0,10).map(r=>(
                      <tr key={r.id}>
                        <td style={{fontFamily:'JetBrains Mono',fontWeight:700,color:'#fb923c'}}>#{r.id}</td>
                        <td><span className="bd bd-b" style={{fontSize:'8px'}}>{r.proto}</span></td>
                        <td style={{fontSize:'9px'}}>{r.srcZone}→{r.dstZone}</td>
                        <td style={{fontSize:'9px'}}>{r.service}</td>
                        <td><span className={`bd bd-${r.action==='ALLOW'?'g':r.action==='DENY'?'r':'y'}`} style={{fontSize:'8px'}}>{r.action}</span></td>
                        <td style={{color:'#60a5fa',fontWeight:700}}>{(r.sessions||0).toLocaleString()}</td>
                        <td style={{color:pcx(pct((r.bw||0)/500*100)),fontWeight:600}}>{r.bw||0}</td>
                        <td style={{fontSize:'9px',color:'var(--mu)'}}>{(r.hits||0).toLocaleString()}</td>
                        <td style={{fontSize:'9px',color:'var(--mu)'}}>{fmtTS(r.lastHit)}</td>
                      </tr>
                    ))}</tbody>
                  </table>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* ── NETWORK TAB ── */}
      {activeTab==='network'&&(
        <div>
          <div className="rpt-page" style={{marginBottom:12}}>
            <div className="rpt-page-title">📡 WAN & Fiber Links</div>
            {wanLinks.map(w=>(
              <div key={w.id} style={{marginBottom:12,paddingBottom:12,borderBottom:'1px solid var(--b)'}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:7}}>
                  <div><b style={{fontSize:13}}>{w.name}</b> <span style={{fontSize:'9px',color:'var(--mu)',marginLeft:8}}>{w.provider} · {w.type}</span></div>
                  <span className={`bd bd-${w.status==='up'?'g':'y'}`}>{w.status?.toUpperCase()||'?'}</span>
                </div>
                <FBar label={`${w.bw}Mbps capacity`} used={w.used||0} total={w.bw}/>
                <div style={{display:'flex',gap:16,marginTop:6,fontSize:'9px',color:'var(--mu)'}}>
                  <span>⏱ {w.latency||0}ms</span><span>📦 {w.packetLoss||0}% loss</span><span>⬆ {w.uptime?fu(w.uptime):'—'}</span>
                </div>
              </div>
            ))}
          </div>
          <div className="rpt-page">
            <div className="rpt-page-title">🔌 Network Switches</div>
            <div className="twrap">
              <table>
                <thead><tr><th>Switch</th><th>IP</th><th>Model</th><th>Status</th><th>Active Ports</th><th>BW Mbps</th><th>Errors</th><th>Uptime</th></tr></thead>
                <tbody>{switches.map(sw=>(
                  <tr key={sw.id}>
                    <td style={{fontWeight:700,color:'#fb923c'}}>{sw.name}</td>
                    <td style={{fontFamily:'JetBrains Mono',fontSize:'9px',color:'var(--mu)'}}>{sw.ip}</td>
                    <td style={{fontSize:'9px',color:'var(--mu)'}}>{sw.model||'—'}</td>
                    <td><span className={`bd bd-${sw.status==='healthy'?'g':'y'}`}>{sw.status?.toUpperCase()||'?'}</span></td>
                    <td>{(sw.ports||[]).filter(p=>p.status==='up').length}/{sw.ports?.length||0}</td>
                    <td>{sw.bandwidth||0}</td>
                    <td style={{color:sw.errors>0?'#f59e0b':'#34d399'}}>{sw.errors||0}</td>
                    <td style={{fontSize:'9px',color:'var(--mu)'}}>{sw.uptime?fu(sw.uptime):'—'}</td>
                  </tr>
                ))}</tbody>
              </table>
            </div>
          </div>
        </div>
      )}

      {/* ── WIFI TAB ── */}
      {activeTab==='wifi'&&(
        <div>
          {(wifiAPs||[]).map(ap=>(
            <div key={ap.id} className="rpt-page" style={{marginBottom:12}}>
              <div className="rpt-page-title" style={{color:'#22d3ee'}}>📶 {ap.name}</div>
              <div className="rpt-kpi-row" style={{marginBottom:10}}>
                <div className="rpt-kpi"><div className="rpt-kpi-l">IP</div><div style={{fontFamily:'JetBrains Mono',fontSize:13,fontWeight:600}}>{ap.ip}</div></div>
                <div className="rpt-kpi"><div className="rpt-kpi-l">Clients</div><div className="rpt-kpi-v" style={{color:'#60a5fa',fontSize:18}}>{ap.clientCount||0}</div></div>
                <div className="rpt-kpi"><div className="rpt-kpi-l">BW Total</div><div className="rpt-kpi-v" style={{color:'#fb923c',fontSize:18}}>{(ap.totalBWDown||0)+(ap.totalBWUp||0)}M</div></div>
                <div className="rpt-kpi"><div className="rpt-kpi-l">Channel Util</div><div className="rpt-kpi-v" style={{color:pcx(ap.channelUtil||0),fontSize:18}}>{ap.channelUtil||0}%</div></div>
              </div>
              {!(ap.clients||[]).length
                ?<div style={{color:'var(--mu)',fontSize:'11px',padding:'12px 0'}}>Run Health Check to load clients</div>
                :(
                  <div className="twrap">
                    <table>
                      <thead><tr><th>#</th><th>Client</th><th>Email</th><th>IP</th><th>SSID</th><th>Signal</th><th>BW↓</th><th>BW↑</th><th>Data MB</th><th>Protocol</th></tr></thead>
                      <tbody>{(ap.clients||[]).sort((a,b)=>(b.bwDown+b.bwUp)-(a.bwDown+a.bwUp)).map((c,i)=>(
                        <tr key={c.id}>
                          <td style={{color:'var(--mu)'}}>{i+1}</td>
                          <td style={{fontFamily:'JetBrains Mono',fontSize:'9px',color:'var(--mu)'}}>{c.ip||'—'}</td>
                          <td style={{fontFamily:'JetBrains Mono',fontSize:'8px',color:'var(--mu2)'}}>{c.mac||'—'}</td>
                          <td style={{fontFamily:'JetBrains Mono',fontSize:'9px',color:'var(--mu)'}}>{c.ip}</td>
                          <td><span style={{background:'rgba(6,182,212,.1)',border:'1px solid rgba(6,182,212,.2)',color:'#22d3ee',padding:'1px 5px',borderRadius:3,fontSize:'8px'}}>{c.ssid}</span></td>
                          <td style={{color:c.signal>-60?'#10b981':c.signal>-70?'#f59e0b':'#ef4444'}}>{c.signal}dB</td>
                          <td style={{color:'#34d399',fontWeight:700}}>{c.bwDown}M</td>
                          <td style={{color:'#a78bfa'}}>{c.bwUp}M</td>
                          <td style={{color:'var(--mu)'}}>{c.totalDataMB}</td>
                          <td><span className="bd bd-b" style={{fontSize:'8px'}}>{c.protocol}</span></td>
                        </tr>
                      ))}</tbody>
                    </table>
                  </div>
                )
              }
            </div>
          ))}
          {!(wifiAPs||[]).length&&<div style={{color:'var(--mu)',fontSize:'11px',padding:'24px 0',textAlign:'center'}}>No WiFi AP data available</div>}
        </div>
      )}

      {/* ── SCHEDULES TAB ── */}
      {activeTab==='schedules'&&(
        <div className="rpt-page">
          <div className="rpt-page-title">⏰ Automated Report Schedules</div>
          <div className="g4" style={{gap:10,marginBottom:12}}>
            {[{k:'daily',l:'Daily',i:'📅',d:'Every 24h'},{k:'weekly',l:'Weekly',i:'📆',d:'Weekly'},{k:'monthly',l:'Monthly',i:'🗓️',d:'Monthly 1st'},{k:'quarterly',l:'Quarterly',i:'📊',d:'Every 3 months'}].map(so=>{
              const s=sched[so.k]||{};
              return(
                <div key={so.k} className={`sc${s.on?' on':''}`}>
                  <div style={{fontSize:22,marginBottom:6}}>{so.i}</div>
                  <div style={{fontFamily:'Plus Jakarta Sans',fontWeight:700,fontSize:12,marginBottom:2}}>{so.l}</div>
                  <div style={{fontSize:'9px',color:'var(--mu)',marginBottom:8}}>{so.d}</div>
                  {s.lastRun&&<div style={{fontSize:'9px',color:'#34d399',marginBottom:4}}>Last: {fmtTS(s.lastRun)}</div>}
                  {s.cnt>0&&<div style={{fontSize:'9px',color:'var(--mu)',marginBottom:6}}>Reports: {s.cnt}</div>}
                  <span className={`bd bd-${s.on?'g':'gr'}`}>{s.on?'● ACTIVE':'○ OFF'}</span>
                  <button className={`btn btn-sm ${s.on?'btn-d':'btn-s'}`} style={{width:'100%',marginTop:8}} onClick={()=>toggleSched(so.k,{...s,on:!s.on})}>{s.on?'⏹ Stop':'▶ Start'}</button>
                </div>
              );
            })}
          </div>
          <div style={{padding:'8px 12px',background:'rgba(249,115,22,.04)',borderRadius:6,fontSize:'10px',color:'var(--mu)'}}>
            💡 Recommended: Daily at 07:00, Weekly Mon 08:00, Monthly 1st 06:00. Each run auto-exports CSV and opens PDF report.
          </div>
        </div>
      )}

      {/* ── HISTORY TAB ── */}
      {activeTab==='history'&&(
        <div>
          {reports.length>=2&&(
            <div className="rpt-page" style={{marginBottom:12}}>
              <div className="rpt-page-title">📈 Health Trend ({reports.length} reports)</div>
              <div style={{position:'relative',height:220,overflow:'hidden'}}><canvas ref={cRef}/></div>
            </div>
          )}
          {reports.length===0&&<div style={{color:'var(--mu)',fontSize:'11px',padding:'24px 0',textAlign:'center'}}>No reports generated yet. Click Generate Report above.</div>}
          {reports.length>0&&(
            <div className="rpt-page">
              <div className="rpt-page-title">📂 Report Log ({reports.length} total)</div>
              <div className="sa" style={{maxHeight:400}}>
                <table>
                  <thead className="sticky-th"><tr><th>#</th><th>Title</th><th>Type</th><th>Servers</th><th>H/W/C</th><th>Threats</th><th>Avg CPU</th><th>WAN</th><th>Time</th></tr></thead>
                  <tbody>{reports.map((r,i)=>(
                    <tr key={r.id}>
                      <td style={{color:'var(--mu)',fontSize:'9px'}}>{reports.length-i}</td>
                      <td style={{fontSize:'10px'}}>{r.title}</td>
                      <td><span className="bd bd-b" style={{fontSize:'8px'}}>{r.schedule||r.type}</span></td>
                      <td>{r.servers}</td>
                      <td><span style={{color:'#34d399'}}>{r.healthy}</span>/<span style={{color:'#fbbf24'}}>{r.warnings||0}</span>/<span style={{color:'#f87171'}}>{r.critical||0}</span></td>
                      <td style={{color:'#f87171'}}>{r.threats?.toLocaleString()}</td>
                      <td style={{color:pcx(r.avgCpu||0),fontWeight:700}}>{r.avgCpu}%</td>
                      <td style={{fontSize:'9px',color:'var(--mu)'}}>{r.wanUtil?.map(w=>`${w.pct}%`).join('/')}</td>
                      <td style={{fontSize:'9px',color:'var(--mu)'}}>{r.generated.toLocaleTimeString()}</td>
                    </tr>
                  ))}</tbody>
                </table>
              </div>
            </div>
          )}
        </div>
      )}

      {/* ── ROADMAP TAB ── */}
      {activeTab==='enhance'&&(
        <div className="rpt-page">
          <div className="rpt-page-title">💡 Future Enhancement Roadmap</div>
          <div className="g3" style={{gap:10}}>
            {[
              {i:'🔐',t:'SSL Certificate Expiry Monitor',d:'Auto-alert 30/14/7 days before cert expiry on all endpoints.'},
              {i:'📧',t:'Email & Webhook Notifications',d:'Send reports via SMTP and post to Slack/Teams on schedule.'},
              {i:'💾',t:'Backup Verification Dashboard',d:'Auto-verify Veeam/Windows Backup status per server daily.'},
              {i:'🦠',t:'AV Compliance Tracker',d:'Track definition age and last-scan timestamps per server.'},
              {i:'📊',t:'Capacity Planning Projections',d:'Trend CPU/disk and forecast saturation dates.'},
              {i:'🔑',t:'AD Account Audit Reports',d:'Monthly inactive accounts, stale GPOs, password age.'},
              {i:'🌡️',t:'Hardware Health (IPMI/iDRAC)',d:'Temperature, fan, PSU, RAID battery in real-time.'},
              {i:'🔄',t:'Change Management Log',d:'Track all config changes, firmware updates, patch deployments.'},
              {i:'📱',t:'Mobile NOC Dashboard',d:'Responsive mobile view for on-call monitoring from phone.'},
            ].map(r=>(
              <div key={r.t} style={{background:'rgba(249,115,22,.03)',border:'1px solid rgba(249,115,22,.1)',borderRadius:7,padding:'11px 13px',display:'flex',gap:10}}>
                <span style={{fontSize:18,flexShrink:0}}>{r.i}</span>
                <div><div style={{fontWeight:700,fontSize:11,marginBottom:3,color:'#fb923c'}}>{r.t}</div><div style={{fontSize:'10px',color:'var(--mu)',lineHeight:1.5}}>{r.d}</div></div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
};


// ─── MOUNT ────────────────────────────────────────────────────────────────────
const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<ToastProvider><App/></ToastProvider>);
</script>
</body>
</html>
